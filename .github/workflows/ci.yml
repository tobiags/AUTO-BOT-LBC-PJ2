name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autobot
          POSTGRES_PASSWORD: autobot
          POSTGRES_DB: autobot_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://autobot:autobot@localhost:5433/autobot_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: ci-test-secret-key-not-for-production
      BROWSER_USE_API_KEY: ""
      SESSIONS_DIR: /tmp/lbc_sessions_ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright / Patchright Chromium
        run: |
          python -m patchright install chromium --with-deps

      - name: Run Alembic migrations
        run: |
          alembic upgrade head

      - name: Run unit tests
        run: |
          pytest -m unit --tb=short -q

      - name: Run integration tests
        run: |
          pytest -m integration --tb=short -q

      - name: Coverage report
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=60 -q
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.5.0

      - name: Lint
        run: ruff check app/ tests/
